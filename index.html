<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Colorable</title>
  <meta name="description" content="Color combination contrast tester — WCAG accessibility scoring">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;800&family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    /* 더잠실체 (눈누 CDN) */
    @font-face {
      font-family: 'TheJamsil';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/TheJamsil3Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'TheJamsil';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/TheJamsil5Bold.woff2') format('woff2');
      font-weight: 600 700; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'TheJamsil';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/TheJamsil6ExtraBold.woff2') format('woff2');
      font-weight: 800; font-style: normal; font-display: swap;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    :root {
      --font-inter: "Inter Tight", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      --font-pretendard: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-jamsil: "TheJamsil", "Apple SD Gothic Neo", sans-serif;
      --font-ibmplex: "IBM Plex Sans KR", -apple-system, sans-serif;
    }
    body {
      font-family: var(--font-inter);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: color .15s ease-out, background-color .15s ease-out;
      min-height: 100vh;
    }
    body[data-font="inter"]      { font-family: var(--font-inter); }
    body[data-font="pretendard"] { font-family: var(--font-pretendard); }
    body[data-font="jamsil"]     { font-family: var(--font-jamsil); }
    body[data-font="ibmplex"]    { font-family: var(--font-ibmplex); }
    .container { max-width: 72rem; margin: 0 auto; padding: 1.5rem; }

    header { display: flex; align-items: center; justify-content: space-between; }
    header .logo { font-weight: 800; letter-spacing: .02em; text-decoration: none; color: inherit; font-size: 1rem; }

    /* ---- Hero: Aa + ratio + badge ---- */
    .hero { padding: 3rem 0 2rem; }
    .hero .aa {
      font-size: clamp(6rem, 24vw, 14rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.02em;
      margin: 0;
    }
    .score { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; margin-top: .5rem; }
    .score .ratio { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 700; line-height: 1; }
    .badge {
      display: inline-block;
      font-size: 1rem; font-weight: 700;
      border: 2px solid currentColor; border-radius: 999px;
      padding: .25rem 1rem;
      vertical-align: middle;
    }
    .badge.fail { opacity: .5; }

    /* ---- Controls ---- */
    .controls { display: grid; grid-template-columns: 1fr; gap: 2rem; padding: 1rem 0 2rem; }
    @media (min-width: 52em) { .controls { grid-template-columns: 1fr 1fr; } }

    .panel .panel-label {
      font-size: .75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      display: block; margin-bottom: .25rem;
    }
    .hex {
      display: block; width: 100%;
      font-family: inherit;
      font-size: clamp(2rem, 6vw, 3rem); font-weight: 700;
      margin: 0 0 1rem; padding: 0;
      border: 0; border-radius: 0;
      color: inherit; background: transparent;
      -webkit-appearance: none; appearance: none;
      outline: none;
    }
    .hex:focus { box-shadow: inset 0 -3px 0 currentColor; }

    .slider-row { margin-bottom: .875rem; }
    .slider-row label { font-size: .8125rem; font-weight: 600; display: block; margin-bottom: .25rem; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      display: block; width: 100%; height: 8px;
      border-radius: 4px; border: 0;
      margin: 0; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: currentColor; border: 0;
      cursor: grab;
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: currentColor; border: 0;
      cursor: grab;
    }
    input[type=range]:focus { outline: none; }
    input[type=range]:focus::-webkit-slider-thumb { box-shadow: 0 0 0 3px currentColor; }
    input[type=range]:focus::-moz-range-thumb { box-shadow: 0 0 0 3px currentColor; }

    /* ---- Buttons ---- */
    .actions { display: flex; gap: .75rem; padding-bottom: 2.5rem; }
    .actions button {
      font-family: inherit; font-size: .875rem; font-weight: 700;
      padding: .625rem 1.25rem;
      border: 0; border-radius: 4px;
      cursor: pointer;
      -webkit-appearance: none; appearance: none;
      transition: opacity .1s;
    }
    .actions button:hover { opacity: .85; }
    .actions button:active { opacity: .7; }

    /* ---- Font switcher ---- */
    .fonts { padding-bottom: 2.5rem; }
    .font-btns { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .375rem; }
    .font-btn {
      font-size: .875rem; font-weight: 600;
      padding: .5rem 1rem;
      border: 1px solid currentColor; border-radius: 4px;
      background: transparent; color: inherit;
      cursor: pointer;
      -webkit-appearance: none; appearance: none;
      transition: opacity .1s;
    }
    .font-btn:hover { opacity: .8; }
    .font-btn[aria-pressed="true"] {
      color: var(--c-bg, #00ffa2);
      background-color: var(--c-text, #004466);
      border-color: var(--c-text, #004466);
    }
    .font-btn.f-inter      { font-family: var(--font-inter); }
    .font-btn.f-pretendard { font-family: var(--font-pretendard); }
    .font-btn.f-jamsil     { font-family: var(--font-jamsil); }
    .font-btn.f-ibmplex    { font-family: var(--font-ibmplex); }

    /* ---- Sample text ---- */
    .sample { max-width: 44rem; padding-bottom: 3rem; }
    .sample h2 { font-size: 1.25rem; font-weight: 700; margin: 0 0 .75rem; }
    .sample p { font-size: 1.125rem; margin: 0; }

  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="logo" href="/">Colorable</a>
    </header>

    <section class="hero">
      <p class="aa">Aa</p>
      <div class="score">
        <span class="ratio" id="ratio">0.00</span>
        <span class="badge" id="badge">Fail</span>
      </div>
    </section>

    <section class="controls">
      <div class="panel" id="panel-text">
        <span class="panel-label">Text</span>
        <input class="hex" id="text-hex" type="text" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" pattern="^#[0-9a-fA-F]+">
        <div class="slider-row">
          <label id="text-hue-label" for="text-hue">Hue</label>
          <input type="range" id="text-hue" min="0" max="360" step="1">
        </div>
        <div class="slider-row">
          <label id="text-saturation-label" for="text-saturation">Saturation</label>
          <input type="range" id="text-saturation" min="0" max="1" step="0.00390625">
        </div>
        <div class="slider-row">
          <label id="text-lightness-label" for="text-lightness">Lightness</label>
          <input type="range" id="text-lightness" min="0" max="1" step="0.00390625">
        </div>
      </div>

      <div class="panel" id="panel-bg">
        <span class="panel-label">Background</span>
        <input class="hex" id="bg-hex" type="text" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" pattern="^#[0-9a-fA-F]+">
        <div class="slider-row">
          <label id="bg-hue-label" for="bg-hue">Hue</label>
          <input type="range" id="bg-hue" min="0" max="360" step="1">
        </div>
        <div class="slider-row">
          <label id="bg-saturation-label" for="bg-saturation">Saturation</label>
          <input type="range" id="bg-saturation" min="0" max="1" step="0.00390625">
        </div>
        <div class="slider-row">
          <label id="bg-lightness-label" for="bg-lightness">Lightness</label>
          <input type="range" id="bg-lightness" min="0" max="1" step="0.00390625">
        </div>
      </div>
    </section>

    <section class="actions">
      <button type="button" id="reverse">Reverse</button>
      <button type="button" id="random">Random</button>
    </section>

    <section class="fonts">
      <span class="panel-label">Font</span>
      <div class="font-btns">
        <button type="button" class="font-btn f-inter" data-font="inter">Inter Tight</button>
        <button type="button" class="font-btn f-pretendard" data-font="pretendard">프리텐다드</button>
        <button type="button" class="font-btn f-jamsil" data-font="jamsil">더잠실</button>
        <button type="button" class="font-btn f-ibmplex" data-font="ibmplex">IBM Plex KR</button>
      </div>
    </section>

    <section class="sample">
      <h2>대비(Contrast)란?</h2>
      <p>대비(contrast)는 어떤 물체(또는 이미지나 디스플레이 상의 그 표현)를 구별할 수 있게 만드는 휘도 또는 색상의 차이입니다. 현실 세계의 시각 인지에서 대비는 같은 시야 안에 있는 물체와 다른 물체들 간의 색상 및 밝기 차이로 결정됩니다.</p>
    </section>

  </div>

  <script>
    // ---------- 색 변환 ----------
    function normHex(h) {
      h = String(h || '').trim().replace(/^#/, '').toLowerCase();
      if (/^[0-9a-f]{3}$/.test(h)) h = h.split('').map(function (c) { return c + c; }).join('');
      return /^[0-9a-f]{6}$/.test(h) ? h : null;
    }
    function hexToHsl(hex) {
      var r = parseInt(hex.substr(0, 2), 16) / 255,
          g = parseInt(hex.substr(2, 2), 16) / 255,
          b = parseInt(hex.substr(4, 2), 16) / 255;
      var max = Math.max(r, g, b), min = Math.min(r, g, b);
      var h = 0, s = 0, l = (max + min) / 2, d = max - min;
      if (d !== 0) {
        s = d / (1 - Math.abs(2 * l - 1));
        switch (max) {
          case r: h = ((g - b) / d) % 6; break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h *= 60;
        if (h < 0) h += 360;
      }
      return { h: h, s: s, l: l };
    }
    function hslToHex(h, s, l) {
      var c = (1 - Math.abs(2 * l - 1)) * s;
      var x = c * (1 - Math.abs((h / 60) % 2 - 1));
      var m = l - c / 2;
      var rgb = h < 60 ? [c, x, 0] : h < 120 ? [x, c, 0] : h < 180 ? [0, c, x]
              : h < 240 ? [0, x, c] : h < 300 ? [x, 0, c] : [c, 0, x];
      return rgb.map(function (v) {
        var hx = Math.round((v + m) * 255).toString(16);
        return hx.length < 2 ? '0' + hx : hx;
      }).join('');
    }
    function luminance(hex) {
      var rgb = [0, 2, 4].map(function (i) {
        var c = parseInt(hex.substr(i, 2), 16) / 255;
        return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
    }
    function contrast(a, b) {
      var la = luminance(a), lb = luminance(b);
      return (Math.max(la, lb) + 0.05) / (Math.min(la, lb) + 0.05);
    }
    function grade(ratio) {
      if (ratio >= 7)   return 'AAA';
      if (ratio >= 4.5) return 'AA';
      if (ratio >= 3)   return 'AA Large';
      return 'Fail';
    }

    // ---------- 상태 ----------
    // 라이브 사이트 기본값: text #004466 on background #00ffa2
    var state = {
      text: hexToHsl('004466'),
      bg:   hexToHsl('00ffa2')
    };

    // URL 경로 /:text/:bg 에서 초기값 로드
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      var t = normHex(parts[0]), b = normHex(parts[1]);
      if (t) state.text = hexToHsl(t);
      if (b) state.bg = hexToHsl(b);
    })();

    var $ = function (id) { return document.getElementById(id); };

    function hexOf(c) { return hslToHex(c.h, c.s, c.l); }

    function gradient(stops) {
      return 'linear-gradient(to right, ' + stops.join(', ') + ')';
    }

    function renderPanel(key) {
      var c = state[key];
      var hex = hexOf(c);
      if (document.activeElement !== $(key + '-hex')) {
        $(key + '-hex').value = '#' + hex;
      }
      $(key + '-hue').value = c.h;
      $(key + '-saturation').value = c.s;
      $(key + '-lightness').value = c.l;
      $(key + '-hue-label').textContent = 'Hue ' + Math.round(c.h) + '°';
      $(key + '-saturation-label').textContent = 'Saturation ' + (Math.round(c.s * 100) / 100);
      $(key + '-lightness-label').textContent = 'Lightness ' + (Math.round(c.l * 100) / 100);

      // 슬라이더 트랙 그라디언트
      var hueStops = [];
      for (var i = 0; i <= 12; i++) {
        hueStops.push('#' + hslToHex(i * 30, c.s, c.l));
      }
      $(key + '-hue').style.background = gradient(hueStops);
      $(key + '-saturation').style.background = gradient([
        '#' + hslToHex(c.h, 0, c.l), '#' + hslToHex(c.h, 1, c.l)
      ]);
      $(key + '-lightness').style.background = gradient([
        '#000000', '#' + hslToHex(c.h, c.s, 0.5), '#ffffff'
      ]);
    }

    function render(pushUrl) {
      var textHex = hexOf(state.text), bgHex = hexOf(state.bg);
      document.body.style.color = '#' + textHex;
      document.body.style.backgroundColor = '#' + bgHex;
      document.body.style.setProperty('--c-text', '#' + textHex);
      document.body.style.setProperty('--c-bg', '#' + bgHex);

      var ratio = contrast(textHex, bgHex);
      $('ratio').textContent = ratio.toFixed(2);
      var g = grade(ratio);
      $('badge').textContent = g;
      $('badge').className = 'badge' + (g === 'Fail' ? ' fail' : '');

      // 버튼은 라이브 사이트처럼 색 반전
      ['reverse', 'random'].forEach(function (id) {
        $(id).style.color = '#' + bgHex;
        $(id).style.backgroundColor = '#' + textHex;
      });

      renderPanel('text');
      renderPanel('bg');

      document.title = 'Colorable — #' + textHex + ' on #' + bgHex;
      if (pushUrl !== false) {
        history.replaceState(null, '', '/' + textHex + '/' + bgHex);
      }
    }

    // ---------- 이벤트 ----------
    ['text', 'bg'].forEach(function (key) {
      ['hue', 'saturation', 'lightness'].forEach(function (ch) {
        $(key + '-' + ch).addEventListener('input', function () {
          state[key][ch === 'hue' ? 'h' : ch === 'saturation' ? 's' : 'l'] = parseFloat(this.value);
          render();
        });
      });
      $(key + '-hex').addEventListener('input', function () {
        var h = normHex(this.value);
        if (h) {
          state[key] = hexToHsl(h);
          render();
        }
      });
    });

    // ---------- 폰트 전환 ----------
    var FONTS = ['inter', 'pretendard', 'jamsil', 'ibmplex'];
    function setFont(name) {
      if (FONTS.indexOf(name) < 0) name = 'inter';
      document.body.setAttribute('data-font', name);
      document.querySelectorAll('.font-btn').forEach(function (btn) {
        btn.setAttribute('aria-pressed', btn.getAttribute('data-font') === name ? 'true' : 'false');
      });
      try { localStorage.setItem('colorable-font', name); } catch (e) {}
    }
    document.querySelectorAll('.font-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        setFont(this.getAttribute('data-font'));
      });
    });
    try { setFont(localStorage.getItem('colorable-font') || 'inter'); }
    catch (e) { setFont('inter'); }

    $('reverse').addEventListener('click', function () {
      var t = state.text; state.text = state.bg; state.bg = t;
      render();
    });

    $('random').addEventListener('click', function () {
      state.text = { h: Math.random() * 360, s: Math.random(), l: Math.random() };
      state.bg   = { h: Math.random() * 360, s: Math.random(), l: Math.random() };
      render();
    });

    window.addEventListener('popstate', function () {
      var parts = location.pathname.split('/').filter(Boolean);
      var t = normHex(parts[0]), b = normHex(parts[1]);
      if (t) state.text = hexToHsl(t);
      if (b) state.bg = hexToHsl(b);
      render(false);
    });

    render();
  </script>
</body>
</html>
